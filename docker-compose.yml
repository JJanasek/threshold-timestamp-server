services:
  keygen:
    build:
      context: .
      target: keygen
    volumes:
      - ./configs:/app/configs
    command: ["keygen", "--k", "2", "--n", "3", "--out", "/app/configs", "--relay", "ws://relay:8080", "--collector", "http://collector:9000"]
    profiles:
      - keygen

  relay:
    image: scsibug/nostr-rs-relay:latest
    platform: linux/amd64
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  collector:
    build:
      context: .
      target: collector
    ports:
      - "9000:9000"
    volumes:
      - ./configs:/app/configs:ro
    environment:
      - RUST_LOG=collector=info
    command: ["--config", "/app/configs/collector.toml"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: on-failure

  coordinator:
    build:
      context: .
      target: coordinator
    ports:
      - "8000:8000"
    volumes:
      - ./configs:/app/configs:ro
    environment:
      - RUST_LOG=coordinator=info
    command: ["--config", "/app/configs/coordinator.toml"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    depends_on:
      relay:
        condition: service_healthy
      collector:
        condition: service_healthy
    restart: on-failure

  web-ui:
    build: ./web-ui
    ports:
      - "3003:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://coordinator:8000
      - NEXT_PUBLIC_COLLECTOR_URL=http://collector:9000
    depends_on:
      coordinator:
        condition: service_healthy
      collector:
        condition: service_healthy

  signer-1:
    build:
      context: .
      target: signer-node
    volumes:
      - ./configs:/app/configs:ro
    environment:
      - RUST_LOG=info
    command: ["--config", "/app/configs/signer_1.toml"]
    depends_on:
      relay:
        condition: service_healthy
      collector:
        condition: service_healthy
    restart: on-failure

  signer-2:
    build:
      context: .
      target: signer-node
    volumes:
      - ./configs:/app/configs:ro
    environment:
      - RUST_LOG=info
    command: ["--config", "/app/configs/signer_2.toml"]
    depends_on:
      relay:
        condition: service_healthy
      collector:
        condition: service_healthy
    restart: on-failure

  signer-3:
    build:
      context: .
      target: signer-node
    volumes:
      - ./configs:/app/configs:ro
    environment:
      - RUST_LOG=info
    command: ["--config", "/app/configs/signer_3.toml"]
    depends_on:
      relay:
        condition: service_healthy
      collector:
        condition: service_healthy
    restart: on-failure
