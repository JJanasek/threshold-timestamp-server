services:
  relay:
    image: scsibug/nostr-rs-relay:latest
    platform: linux/amd64
    ports:
      - "8081:8080"

  coordinator:
    build:
      context: .
      target: coordinator
    ports:
      - "8000:8000"
    volumes:
      - ./configs:/app/configs:ro
    environment:
      - RUST_LOG=coordinator=info
    command: ["--config", "/app/configs/coordinator.toml"]
    depends_on:
      - relay
    restart: on-failure

  signer-1:
    build:
      context: .
      target: signer-node
    volumes:
      - ./configs:/app/configs:ro
    environment:
      - RUST_LOG=info
    command: ["--config", "/app/configs/signer_1.toml"]
    depends_on:
      - relay
    restart: on-failure

  signer-2:
    build:
      context: .
      target: signer-node
    volumes:
      - ./configs:/app/configs:ro
    environment:
      - RUST_LOG=info
    command: ["--config", "/app/configs/signer_2.toml"]
    depends_on:
      - relay
    restart: on-failure

  signer-3:
    build:
      context: .
      target: signer-node
    volumes:
      - ./configs:/app/configs:ro
    environment:
      - RUST_LOG=info
    command: ["--config", "/app/configs/signer_3.toml"]
    depends_on:
      - relay
    restart: on-failure
