name: Rust CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # Installs the latest stable Rust toolchain
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    # Caches cargo registry and build artifacts to speed up future runs
    - name: Cache Cargo registry & index
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    # Lints the code looking for common mistakes
    - name: Run Clippy
      run: cargo clippy --workspace -- -D warnings

    # Builds all crates in the workspace
    - name: Build
      run: cargo build --verbose --workspace

    # Runs all unit tests defined in your crates
    - name: Run Tests
      run: cargo test --verbose --workspace