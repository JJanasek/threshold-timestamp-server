name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

      - name: Generate keys and configs
        run: |
          mkdir -p configs
          docker compose --profile keygen run --rm keygen
          printf 'host = "0.0.0.0"\nport = 9000\nmax_events = 10000\n' > configs/collector.toml

      - name: Start services
        run: |
          docker compose up -d relay collector coordinator signer-1 signer-2 signer-3
          echo "Waiting for coordinator to be healthy..."
          timeout 120 bash -c 'until curl -sf http://localhost:8000/health > /dev/null 2>&1; do sleep 2; done'
          echo "Coordinator is ready."

      - name: Run E2E test suite
        run: ./tests/e2e.sh

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans
